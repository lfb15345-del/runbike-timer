name: runbike_app
description: "繝ｩ繝ｳ繝舌う繧ｯ邱ｴ鄙偵・繧ｿ繧､繝險域ｸｬ繧｢繝励Μ"
publish_to: 'none'
version: 1.0.3+8

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^6.1.0
  intl: ^0.20.2
  camera: ^0.11.1
  path_provider: ^2.1.5
  flutter_launcher_icons: ^0.14.3
  sqflite: ^2.4.2
  gallery_saver_plus: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
  fonts:
    - family: Noto Sans JP
      fonts:
        - asset: assets/fonts/NotoSansJP-VariableFont_wght.ttf
