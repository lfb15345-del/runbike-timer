# Codemagic CI/CD 設定
# WindowsからiOSアプリをビルドするためのクラウドmacOS設定
# 使い方: https://codemagic.io でこのリポジトリを連携すると自動で読み込まれる
workflows:
  ios-testflight:
    name: iOS ビルド → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Codemagic の Personal Account > Integrations > Developer Portal に
      # 登録済みのApp Store Connect APIキー名（KIZAMONI liveと共用）
      app_store_connect: kizamoni_asc
    environment:
      flutter: stable
      vars:
        BUNDLE_ID: com.runbike.runbikeApp
    scripts:
      - name: 署名ファイルを取得（存在しなければ自動作成）
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: 証明書をキーチェーンに登録
        script: |
          keychain initialize
          keychain add-certificates
      - name: Xcodeプロジェクトにプロファイルを適用
        script: xcode-project use-profiles
      - name: 依存パッケージ取得
        script: flutter pub get
      - name: iOS リリースビルド（署名付き ipa 作成）
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        # ビルド成功後、自動で TestFlight にアップロード
        submit_to_testflight: true
